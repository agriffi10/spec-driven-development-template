name: Spec Lint

on:
  pull_request:
    paths:
      - "docs/specs/**"
      - "scripts/spec-lint.sh"
      - ".github/workflows/spec-lint.yml"
  push:
    branches: [main]

jobs:
  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run spec-lint
        run: sh scripts/spec-lint.sh docs/specs
